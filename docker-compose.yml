services:
  broker:
    build: .
    command: uvicorn app.broker.main:app --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    networks:
      - appnet
    env_file:
      - .env

  device:
    build: .
    command: python -m app.device.main 
    # networks:
    #   - appnet
    env_file:
      - .env

  nginx:
    image: nginx:latest
    ports:
      - "9000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - broker
    networks:
      - appnet

networks:
  appnet:
